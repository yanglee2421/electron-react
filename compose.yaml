services:
  linux-builder:
    build:
      context: .
      args:
        ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
        npm_package_config_node_gyp_dist_url: https://npmmirror.com/mirrors/node/
    image: builder:linux
    container_name: build_linux
    volumes:
      - ./packages/electron-app/release:/output_dist
